<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>S.H.I.E.L.D. Test</title>
  <!-- plugins.js MUST come from the Document Server that renders the editor, not from the
       portal: it is the bridge to the editor's API. Loading a copy from elsewhere gives a
       plugin that draws but can never talk to the document. -->
  <script type="text/javascript" src="https://shield-office.quentinthierry.fr/sdkjs-plugins/v1/plugins.js"></script>
  <script type="text/javascript" src="https://shield-office.quentinthierry.fr/sdkjs-plugins/v1/plugins-ui.js"></script>
  <link rel="stylesheet" href="https://shield-office.quentinthierry.fr/sdkjs-plugins/v1/plugins.css" />
  <style>
    body { font-family: "Segoe UI", system-ui, sans-serif; padding: 14px; margin: 0; }
    h3 { margin: 0 0 8px; font-size: 13px; letter-spacing: .08em; color: #1c3a5e; }
    p { font-size: 12px; color: #444; margin: 0 0 12px; line-height: 1.5; }
    button { padding: 7px 14px; font-size: 12px; cursor: pointer; }
    #state { font-size: 11px; color: #777; margin-top: 10px; font-family: Consolas, monospace; }
  </style>
</head>
<body>
  <h3>S.H.I.E.L.D. — CANAL DE TEST</h3>
  <p>Si ce panneau s'affiche, le plugin est chargé depuis le portail. Le bouton vérifie que
     le plugin peut réellement écrire dans le document.</p>
  <button id="probe">Écrire une marque de test</button>
  <div id="state">en attente…</div>
  <script type="text/javascript" src="code.js"></script>
</body>
</html>
