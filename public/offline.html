<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#070b12" />
    <title>Offline — S.H.I.E.L.D.</title>
    <style>
      :root { --bg:#070b12; --panel:#0d1420; --border:#1c2a3f; --accent:#4da6ff; --text:#c9d6e5; --muted:#5f7590; }
      * { box-sizing:border-box; margin:0; padding:0; }
      body {
        background: radial-gradient(ellipse at center, #0c1524 0%, var(--bg) 70%);
        color: var(--text); font-family:"Segoe UI", system-ui, sans-serif;
        min-height:100vh; display:flex; align-items:center; justify-content:center;
        padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
      }
      .box { text-align:center; max-width:360px; }
      img { width:88px; height:88px; margin-bottom:18px; filter:drop-shadow(0 6px 20px rgba(0,0,0,.6)); }
      h1 { font-family:"Consolas","Courier New",monospace; color:var(--accent); text-transform:uppercase;
           letter-spacing:.1em; font-size:1.1rem; margin-bottom:10px; }
      p { color:var(--muted); font-size:.9rem; line-height:1.5; margin-bottom:22px; }
      button {
        padding:11px 20px; background:#1a4a7a; color:#dceaff; border:1px solid var(--accent);
        border-radius:5px; cursor:pointer; font-family:Consolas,monospace; text-transform:uppercase;
        letter-spacing:.06em;
      }
      button:hover { background:var(--accent); color:#041020; }
    </style>
  </head>
  <body>
    <div class="box">
      <img src="/icon.svg" alt="S.H.I.E.L.D." />
      <h1>Link severed</h1>
      <p>Connection to the S.H.I.E.L.D. network is unavailable. Check your connection, then try again.</p>
      <button onclick="location.reload()">Re-establish link</button>
    </div>
  </body>
</html>
