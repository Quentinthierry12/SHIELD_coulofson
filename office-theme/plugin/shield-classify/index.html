<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>S.H.I.E.L.D. Classify</title>
    <!-- Local plugin API served by the self-hosted document server -->
    <script type="text/javascript" src="/sdkjs-plugins/v1/plugins.js"></script>
    <script type="text/javascript" src="/sdkjs-plugins/v1/plugins-ui.js"></script>
    <link rel="stylesheet" href="/sdkjs-plugins/v1/plugins.css">
    <style>
        body { font-family: "Segoe UI", system-ui, sans-serif; background: #0d1420; color: #c9d6e5; margin: 0; padding: 12px; }
        h4 { margin: 0 0 4px; color: #4da6ff; font-family: Consolas, monospace; text-transform: uppercase; letter-spacing: 0.06em; font-size: 12px; }
        p { color: #5f7590; font-size: 11px; margin: 0 0 12px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
        button {
            padding: 9px; border: 1px solid #1c2a3f; border-radius: 4px; cursor: pointer;
            background: #0a101a; color: #c9d6e5; font-family: Consolas, monospace; font-size: 12px;
        }
        button:hover { background: #1a4a7a; border-color: #4da6ff; color: #dceaff; }
        .lvl-hi { border-left: 3px solid #ff5c5c; }
        .lvl-mid { border-left: 3px solid #e8c25a; }
        .lvl-low { border-left: 3px solid #4dd08a; }
        .hint { margin-top: 12px; color: #5f7590; font-size: 10px; font-style: italic; }
    </style>
    <script type="text/javascript" src="code.js"></script>
</head>
<body>
    <h4>Classification</h4>
    <p>Place the cursor in a paragraph, then pick a clearance level. Agents below it see the paragraph redacted.</p>
    <div class="grid" id="levels"></div>
    <div class="hint">Inserts a [[CLR:n]] marker. Remove it to declassify.</div>
</body>
</html>
