<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #0a101a; --tab: #12213a; --tab-on: #12325a; --border: #25507f;
      --text: #dce9f7; --muted: #7f93ad; --accent: #4da6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif; background: var(--bg); color: var(--text);
      height: 100vh; display: flex; align-items: flex-end; overflow: hidden;
      user-select: none; -webkit-app-region: drag;   /* the strip drags the window */
    }
    #strip { display: flex; align-items: flex-end; flex: 1; height: 100%; padding: 0 4px; gap: 2px; overflow-x: auto; }
    #strip::-webkit-scrollbar { height: 0; }
    .tab {
      -webkit-app-region: no-drag;
      display: flex; align-items: center; gap: 8px;
      height: 32px; padding: 0 10px 0 12px; min-width: 120px; max-width: 230px;
      background: var(--tab); border: 1px solid var(--border); border-bottom: none;
      border-radius: 5px 5px 0 0; cursor: default; font-size: 12px; white-space: nowrap;
    }
    .tab:hover { background: #16294a; }
    .tab.active { background: var(--tab-on); border-color: var(--accent); }
    .tab .name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .tab .kind {
      font-size: 9px; font-family: Consolas, monospace; letter-spacing: .06em;
      color: var(--accent); border: 1px solid var(--border); border-radius: 2px; padding: 1px 4px;
    }
    .tab .x { color: var(--muted); font-size: 15px; line-height: 1; padding: 0 2px; border-radius: 3px; }
    .tab .x:hover { background: #7a1010; color: #fff; }
    .tab.home .x { display: none; }          /* the portal tab is the app itself */
    #new {
      -webkit-app-region: no-drag;
      height: 26px; width: 26px; margin: 0 6px 3px; border: 1px solid var(--border);
      border-radius: 4px; background: transparent; color: var(--muted);
      font-size: 15px; line-height: 1; cursor: default;
    }
    #new:hover { border-color: var(--accent); color: var(--accent); }
    #win { -webkit-app-region: no-drag; display: flex; height: 100%; align-items: stretch; }
    #win button {
      width: 44px; border: none; background: transparent; color: var(--muted);
      font-family: "Segoe MDL2 Assets", "Segoe UI Symbol", sans-serif; font-size: 10px; cursor: default;
    }
    #win button:hover { background: #16294a; color: var(--text); }
    #win #close:hover { background: #c42b1c; color: #fff; }
  </style>
</head>
<body>
  <div id="strip"></div>
  <button id="new" title="Nouvel onglet — Archives">+</button>
  <div id="win">
    <button id="min" title="Réduire">&#xE921;</button>
    <button id="max" title="Agrandir">&#xE922;</button>
    <button id="close" title="Réduire dans la barre des tâches">&#xE8BB;</button>
  </div>
  <script src="tabs.js"></script>
</body>
</html>
